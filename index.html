<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title></title><meta name="description" content="Pinky's Space is a living art and community project born in New York City, existing at the intersection of food, street culture, memory, and imagination."><meta property="og:title" content="Pinky's Space"><meta property="og:description" content="A living archive of signal, motion and memory. Born in New York City."><meta property="og:url" content="https://pinkys.space"><meta property="og:type" content="website"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="Pinky's Space"><meta name="twitter:description" content="A living archive of signal, motion and memory."><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23e91e8c'/%3E%3Ccircle cx='50' cy='50' r='28' fill='none' stroke='%23fff' stroke-width='8'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23fff'/%3E%3C/svg%3E"><style>
    :root {
      --pink:#e91e8c; --yellow:#f5d800; --blue:#0057d9;
      --orange:#ff5c00; --green:#00b86b; --purple:#7b2fff;
      --bg:#0a0a0a; --bg2:#111; --text:#f0f0f0; --muted:#888; --line-w:4px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:system-ui,'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

    .ticker{background:var(--pink);height:36px;overflow:hidden;display:flex;align-items:center;}
    .ticker-track{display:flex;white-space:nowrap;animation:ticker 28s linear infinite;}
    .ticker-track span{font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#fff;padding:0 2.5rem;}
    .ticker-track span::before{content:'●';margin-right:.8rem;opacity:.6;}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    header{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:var(--line-w) solid var(--pink);padding:0 clamp(1rem,5vw,3rem);display:flex;align-items:center;justify-content:space-between;height:60px;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-dot{width:20px;height:20px;border-radius:50%;background:var(--pink);border:3px solid #fff;flex-shrink:0;animation:pulse-dot 2.5s ease-in-out infinite;}
    @keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(233,30,140,.5)}50%{box-shadow:0 0 0 8px rgba(233,30,140,0)}}
    .logo-text{font-size:.95rem;font-weight:900;letter-spacing:.05em;color:#fff;text-transform:uppercase;}
    nav{display:flex;align-items:center;gap:clamp(.4rem,1.2vw,1.2rem);flex-wrap:wrap;}
    nav a{color:var(--muted);text-decoration:none;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:color .2s;}
    nav a:hover{color:var(--pink);}
    .map-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:.4rem .9rem;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:var(--line-w) solid var(--yellow);color:var(--yellow);background:none;cursor:pointer;transition:background .2s,color .2s;}
    .map-nav-btn:hover{background:var(--yellow);color:#000;}
    .deploy-nav-btn{display:inline-flex;align-items:center;gap:6px;padding:.4rem .9rem;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:var(--line-w) solid var(--green);color:var(--green);background:none;cursor:pointer;transition:background .2s,color .2s;}
    .deploy-nav-btn:hover{background:var(--green);color:#000;}

    .hero{position:relative;padding:clamp(4rem,10vw,8rem) clamp(1rem,5vw,3rem) clamp(3rem,8vw,6rem);overflow:hidden;}
    .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 49.5%,rgba(229,30,140,.1) 49.5%,rgba(229,30,140,.1) 50.5%,transparent 50.5%),linear-gradient(0deg,transparent 29.5%,rgba(0,87,217,.08) 29.5%,rgba(0,87,217,.08) 30.5%,transparent 30.5%);pointer-events:none;}
    .hero-inner{position:relative;max-width:900px;}
    .route-tag{display:inline-flex;align-items:center;gap:8px;background:var(--pink);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;padding:4px 12px 4px 8px;border-radius:2px;margin-bottom:1.5rem;}
    .route-tag::before{content:'';width:10px;height:10px;border-radius:50%;background:#fff;flex-shrink:0;}
    .hero h1{font-size:clamp(2.8rem,8vw,6.5rem);font-weight:900;line-height:.95;letter-spacing:-.03em;text-transform:uppercase;margin-bottom:1.5rem;}
    .hero h1 span{color:var(--pink);}
    .hero-tagline{font-size:clamp(1rem,2.5vw,1.25rem);color:var(--muted);font-weight:300;max-width:560px;line-height:1.6;margin-bottom:2.5rem;}
    .hero-meta{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
    .station-badge{display:flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
    .station-badge::before{content:'';width:12px;height:12px;border-radius:50%;background:currentColor;flex-shrink:0;}

    section{padding:clamp(3rem,8vw,6rem) clamp(1rem,5vw,3rem);}
    .section-header{display:flex;align-items:center;gap:1rem;margin-bottom:clamp(2rem,5vw,3.5rem);}
    .section-line{height:var(--line-w);flex:1;max-width:60px;border-radius:2px;}
    .section-label{font-size:.68rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
    .section-title{font-size:clamp(1.5rem,4vw,2.4rem);font-weight:900;letter-spacing:-.02em;text-transform:uppercase;}

    .about{background:var(--bg2);}
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4rem);align-items:center;max-width:1100px;}
    @media(max-width:700px){.about-grid{grid-template-columns:1fr;}}
    .about-photo{position:relative;}
    .about-photo img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;filter:grayscale(20%) contrast(1.1);}
    .photo-frame{position:absolute;inset:-8px;border:var(--line-w) solid var(--pink);pointer-events:none;z-index:1;}
    .photo-node{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--pink);border:3px solid var(--bg2);z-index:2;animation:pulse-dot 2.5s ease-in-out infinite;}
    .photo-node.tl{top:-8px;left:-8px;}.photo-node.tr{top:-8px;right:-8px;}
    .photo-node.bl{bottom:-8px;left:-8px;}.photo-node.br{bottom:-8px;right:-8px;}
    .about-text p{font-size:clamp(.95rem,1.8vw,1.1rem);line-height:1.8;color:#ccc;margin-bottom:1.2rem;}
    .about-text p:last-child{margin-bottom:0;}

    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:1.5rem;max-width:1200px;}
    .project-card{background:var(--bg2);border:1px solid #1e1e1e;overflow:hidden;position:relative;transition:transform .25s,border-color .25s;}
    .project-card:hover{transform:translateY(-4px);border-color:var(--card-color,var(--pink));}
    .project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:var(--line-w);background:var(--card-color,var(--pink));}
    .card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:grayscale(30%) contrast(1.05);transition:filter .3s;}
    .project-card:hover .card-img{filter:grayscale(0%) contrast(1.1);}
    .card-body{padding:1.25rem;}
    .card-route{display:inline-flex;align-items:center;gap:6px;font-size:.63rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--card-color,var(--pink));margin-bottom:.6rem;}
    .card-route::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--card-color,var(--pink));flex-shrink:0;}
    .card-title{font-size:1.05rem;font-weight:700;letter-spacing:-.01em;margin-bottom:.5rem;line-height:1.3;}
    .card-desc{font-size:.85rem;color:var(--muted);line-height:1.6;}

    .signal{background:var(--bg2);}
    .signal-map{position:relative;max-width:900px;padding:2rem 0;}
    .signal-map::before{content:'';position:absolute;top:50%;left:0;right:0;height:var(--line-w);background:linear-gradient(90deg,var(--pink),var(--blue),var(--yellow),var(--orange),var(--green),var(--purple));transform:translateY(-50%);}
    .signal-stops{display:flex;flex-wrap:wrap;gap:1.5rem 2.5rem;position:relative;z-index:1;}
    .signal-stop{display:flex;flex-direction:column;align-items:center;gap:.5rem;}
    .stop-node{width:20px;height:20px;border-radius:50%;border:3px solid var(--bg2);flex-shrink:0;}
    .stop-label{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text);text-align:center;max-width:90px;word-break:break-word;}

    .zine{background:var(--bg);}
    .zine-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,280px),1fr));gap:1.5rem;max-width:1200px;}
    .zine-card{border:1px solid #1e1e1e;padding:1.5rem;position:relative;transition:border-color .25s;}
    .zine-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--zine-color,var(--pink));}
    .zine-card:hover{border-color:var(--zine-color,var(--pink));}
    .zine-date{font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem;}
    .zine-headline{font-size:1rem;font-weight:900;letter-spacing:-.01em;line-height:1.3;margin-bottom:.7rem;text-transform:uppercase;}
    .zine-body{font-size:.82rem;color:var(--muted);line-height:1.7;}
    .zine-tag{display:inline-block;margin-top:.9rem;font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--zine-color,var(--pink));border:1px solid var(--zine-color,var(--pink));padding:2px 8px;}

    .contact-inner{max-width:700px;}
    .contact-tagline{font-size:clamp(1rem,2.5vw,1.2rem);color:var(--muted);line-height:1.7;margin-bottom:2.5rem;}
    .contact-links{display:flex;flex-wrap:wrap;gap:1rem;}
    .contact-link{display:inline-flex;align-items:center;gap:10px;padding:.75rem 1.5rem;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border:var(--line-w) solid;transition:background .2s,color .2s;}
    .contact-link .cl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .contact-link.pink{color:var(--pink);border-color:var(--pink);}
    .contact-link.blue{color:var(--blue);border-color:var(--blue);}
    .contact-link.green{color:var(--green);border-color:var(--green);}
    .contact-link.pink:hover{background:var(--pink);color:#fff;}
    .contact-link.blue:hover{background:var(--blue);color:#fff;}
    .contact-link.green:hover{background:var(--green);color:#fff;}

    footer{border-top:var(--line-w) solid #1e1e1e;padding:2rem clamp(1rem,5vw,3rem);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
    .footer-left{display:flex;align-items:center;gap:10px;}
    .footer-dot{width:14px;height:14px;border-radius:50%;background:var(--pink);animation:pulse-dot 2.5s ease-in-out infinite;}
    .footer-text{font-size:.72rem;color:var(--muted);letter-spacing:.05em;}
    .footer-right{font-size:.68rem;color:#444;letter-spacing:.08em;text-transform:uppercase;}

    .transit-divider{height:6px;background:linear-gradient(90deg,var(--pink) 0%,var(--pink) 20%,var(--blue) 20%,var(--blue) 40%,var(--yellow) 40%,var(--yellow) 60%,var(--orange) 60%,var(--orange) 80%,var(--green) 80%,var(--green) 100%);}

    .reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
    .reveal.visible{opacity:1;transform:none;}

    /* MAP PAGE */
    #map-page{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;}
    #map-page.open{display:block;}
    .map-header{position:sticky;top:0;background:var(--bg);border-bottom:var(--line-w) solid var(--pink);padding:0 clamp(1rem,5vw,3rem);display:flex;align-items:center;justify-content:space-between;height:60px;z-index:10;}
    .map-close{background:none;border:2px solid var(--pink);color:var(--pink);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.4rem 1rem;cursor:pointer;transition:background .2s,color .2s;}
    .map-close:hover{background:var(--pink);color:#fff;}
    .map-title-text{font-size:.9rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;}
    .map-canvas{padding:clamp(2rem,6vw,4rem) clamp(1rem,5vw,3rem);max-width:1100px;margin:0 auto;}
    .map-legend{display:flex;flex-wrap:wrap;gap:.75rem 1.5rem;margin-bottom:3rem;}
    .legend-item{display:flex;align-items:center;gap:.5rem;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
    .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
    .map-svg-wrap{width:100%;overflow-x:auto;}
    .map-svg-wrap svg{min-width:700px;width:100%;height:auto;}
    .route-line-animated{stroke-dasharray:1000;stroke-dashoffset:1000;transition:stroke-dashoffset 1.8s ease;}
    .route-line-animated.drawn{stroke-dashoffset:0;}

    /* STATION POPUP */
    .station-popup{display:none;position:fixed;z-index:400;background:var(--bg2);border:var(--line-w) solid var(--pink);padding:1.5rem;max-width:320px;width:90vw;}
    .station-popup.open{display:block;}
    .popup-route{font-size:.63rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.4rem;}
    .popup-title{font-size:1.1rem;font-weight:900;margin-bottom:.6rem;line-height:1.2;}
    .popup-desc{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:1rem;}
    .popup-close{background:none;border:none;color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;padding:0;}
    .popup-close:hover{color:#fff;}

    /* DEPLOY PAGE */
    #deploy-page{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto;}
    #deploy-page.open{display:block;}
    .deploy-header{position:sticky;top:0;background:var(--bg);border-bottom:var(--line-w) solid var(--green);padding:0 clamp(1rem,5vw,3rem);display:flex;align-items:center;justify-content:space-between;height:60px;z-index:10;}
    .deploy-close{background:none;border:2px solid var(--green);color:var(--green);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:.4rem 1rem;cursor:pointer;transition:background .2s,color .2s;}
    .deploy-close:hover{background:var(--green);color:#000;}
    .deploy-canvas{padding:clamp(2rem,6vw,4rem) clamp(1rem,5vw,3rem);max-width:900px;margin:0 auto;}
    .deploy-hero{margin-bottom:3rem;}
    .deploy-hero h2{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-.03em;text-transform:uppercase;line-height:1;margin-bottom:1rem;}
    .deploy-hero h2 span{color:var(--green);}
    .deploy-hero p{font-size:1rem;color:var(--muted);line-height:1.7;max-width:600px;}

    .deploy-steps{display:flex;flex-direction:column;gap:1.5rem;margin-bottom:3rem;}
    .deploy-step{border:1px solid #1e1e1e;padding:1.5rem 1.5rem 1.5rem 5rem;position:relative;transition:border-color .3s;}
    .deploy-step:hover{border-color:var(--step-color,var(--green));}
    .deploy-step::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--step-color,var(--green));}
    .step-num{position:absolute;left:1.2rem;top:50%;transform:translateY(-50%);font-size:1.8rem;font-weight:900;color:var(--step-color,var(--green));opacity:.25;line-height:1;}
    .step-title{font-size:1rem;font-weight:900;letter-spacing:.02em;text-transform:uppercase;margin-bottom:.5rem;}
    .step-body{font-size:.85rem;color:var(--muted);line-height:1.7;}
    .step-body strong{color:var(--text);}
    .step-body code{background:#1a1a1a;color:var(--yellow);padding:2px 7px;font-size:.8rem;border-radius:2px;font-family:monospace;}

    .folder-tree{background:#0d0d0d;border:1px solid #1e1e1e;border-left:4px solid var(--yellow);padding:1.5rem;margin:1rem 0;font-family:monospace;font-size:.85rem;line-height:2;}
    .folder-tree .dir{color:var(--yellow);}
    .folder-tree .file{color:var(--green);}
    .folder-tree .comment{color:var(--muted);}

    .host-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,200px),1fr));gap:1rem;margin:1.5rem 0;}
    .host-card{border:1px solid #1e1e1e;padding:1.25rem;position:relative;transition:border-color .25s,transform .25s;text-decoration:none;display:block;}
    .host-card:hover{border-color:var(--host-color,var(--green));transform:translateY(-3px);}
    .host-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--host-color,var(--green));}
    .host-name{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--text);margin-bottom:.4rem;}
    .host-tag{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--host-color,var(--green));margin-bottom:.6rem;}
    .host-desc{font-size:.78rem;color:var(--muted);line-height:1.6;}

    .domain-table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.82rem;}
    .domain-table th{text-align:left;font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:.6rem 1rem;border-bottom:1px solid #1e1e1e;}
    .domain-table td{padding:.75rem 1rem;border-bottom:1px solid #111;color:var(--text);vertical-align:top;}
    .domain-table tr:hover td{background:#0d0d0d;}
    .domain-pill{display:inline-block;padding:2px 10px;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:20px;}

    .drag-zone{border:2px dashed #333;padding:3rem 2rem;text-align:center;margin:1.5rem 0;transition:border-color .3s,background .3s;cursor:pointer;position:relative;}
    .drag-zone:hover,.drag-zone.dragover{border-color:var(--green);background:rgba(0,184,107,.05);}
    .drag-zone-icon{font-size:3rem;margin-bottom:1rem;display:block;}
    .drag-zone-title{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;}
    .drag-zone-sub{font-size:.78rem;color:var(--muted);}
    .drag-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .drag-status{margin-top:1rem;font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green);display:none;}

    .netlify-btn{display:inline-flex;align-items:center;gap:12px;padding:1rem 2rem;background:var(--green);color:#000;font-size:.85rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:opacity .2s;margin-top:1rem;}
    .netlify-btn:hover{opacity:.85;}

    @media(max-width:600px){
      nav a:nth-child(n+3){display:none;}
      .deploy-step{padding:1.25rem 1.25rem 1.25rem 4rem;}
      .step-num{font-size:1.4rem;left:.9rem;}
